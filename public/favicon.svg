<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#2563eb"/>
  
  <!-- Network/Chart icon -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Chart bars representing monitoring -->
    <line x1="16" y1="40" x2="16" y2="24" opacity="0.9"/>
    <line x1="24" y1="40" x2="24" y2="20" opacity="0.9"/>
    <line x1="32" y1="40" x2="32" y2="16" opacity="0.9"/>
    <line x1="40" y1="40" x2="40" y2="22" opacity="0.9"/>
    <line x1="48" y1="40" x2="48" y2="28" opacity="0.9"/>
    
    <!-- Connection lines -->
    <line x1="16" y1="24" x2="24" y2="20" opacity="0.7"/>
    <line x1="24" y1="20" x2="32" y2="16" opacity="0.7"/>
    <line x1="32" y1="16" x2="40" y2="22" opacity="0.7"/>
    <line x1="40" y1="22" x2="48" y2="28" opacity="0.7"/>
  </g>
  
  <!-- Small indicator dots -->
  <circle cx="20" cy="18" r="2" fill="white" opacity="0.8"/>
  <circle cx="28" cy="14" r="2" fill="white" opacity="0.8"/>
  <circle cx="36" cy="18" r="2" fill="white" opacity="0.8"/>
  <circle cx="44" cy="24" r="2" fill="white" opacity="0.8"/>
</svg>

